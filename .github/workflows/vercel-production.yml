name: Vercel Production Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN || vars.VERCEL_TOKEN }}
      VERCEL_ORG_ID: team_cQrpkN7uNFlOB8TvvzcDLAam
      VERCEL_PROJECT_ID: prj_PYnqxqixdZThCpkHyuPJ83ONDjlW
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel environment
        run: npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build prebuilt output
        run: npx vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt output
        run: npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
